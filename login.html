<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>SkyFrost — Accedi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>body { font-family: 'Inter','Segoe UI',system-ui,sans-serif; }</style>
</head>
<body>
<div class="bg-scene"></div>
<div class="page-wrapper">

  <div class="auth-wrap">
    <div class="auth-box fu">
      <h2>Accedi</h2>
      <p class="auth-sub">Bentornato su SkyFrost — inserisci le tue credenziali.</p>

      <button class="dc-btn">💬 Continua con Discord</button>

      <div class="auth-div">oppure con email</div>

      <div class="f-grp">
        <label class="f-lbl">Username / Email</label>
        <input type="text" class="f-inp" placeholder="Il tuo username..." autocomplete="username">
      </div>
      <div class="f-grp">
        <label class="f-lbl">Password</label>
        <input type="password" class="f-inp" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div style="text-align:right;margin:-6px 0 10px">
        <a href="#" style="font-size:.68rem;color:var(--text-3)">Password dimenticata?</a>
      </div>
      <button class="f-submit">Accedi</button>
      <div class="auth-lnk">Non hai un account? <a href="register.html">Registrati gratis</a></div>
    </div>
  </div>

</div>
<script src="assets/components.js"></script>
<script src="assets/main.js"></script>
</body>
</html>
