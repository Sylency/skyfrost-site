<!DOCTYPE html>
<html lang="it">
<head>
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;0,800;1,300&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyFrost — Login</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    .auth-page {
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .auth-box {
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--ice-400), var(--cyan));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 14px;
      box-shadow: 0 0 30px var(--ice-glow);
    }
    .auth-logo h1 {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: .05em;
    }
    .auth-logo p { color: var(--text-2); font-size: .88rem; margin-top: 4px; }

    .auth-card { padding: 32px; }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-3);
      font-size: .78rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-2);
      font-family: var(--font-body);
      font-size: .88rem;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 10px;
    }
    .social-btn:hover {
      border-color: var(--border-h);
      color: var(--text-1);
      background: var(--glass-b);
    }

    .forgot { text-align: right; margin-top: -10px; margin-bottom: 18px; }
    .forgot a { font-size: .8rem; color: var(--text-3); }
    .forgot a:hover { color: var(--ice-400); }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: .85rem;
      color: var(--text-3);
    }

    .btn-submit {
      width: 100%;
      justify-content: center;
      padding: 13px;
      font-size: .95rem;
    }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="page-wrapper">

  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo fade-up">
        <div class="logo-icon">❄</div>
        <h1>Sky<span style="color:var(--ice-400)">Frost</span></h1>
        <p>Accedi al tuo account</p>
      </div>

      <div class="card auth-card fade-up delay-1">

        <button class="social-btn">
          <span>🎮</span> Continua con Discord
        </button>

        <div class="auth-divider">oppure con email</div>

        <div class="form-group">
          <label class="sf-label" for="email">Username / Email</label>
          <input id="email" type="text" class="sf-input" placeholder="Il tuo username..." autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="sf-label" for="password">Password</label>
          <input id="password" type="password" class="sf-input" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <div class="forgot"><a href="#">Password dimenticata?</a></div>

        <button class="btn btn-primary btn-submit">Accedi</button>

        <div class="auth-footer">
          Non hai un account? <a href="register.html" style="color:var(--ice-400)">Registrati gratis</a>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="assets/components.js"></script>
<script src="assets/main.js"></script>
</body>
</html>
