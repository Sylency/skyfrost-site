<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>SkyFrost — Registrati</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>body { font-family: 'Inter','Segoe UI',system-ui,sans-serif; }</style>
</head>
<body>
<div class="bg-scene"></div>
<div class="page-wrapper">

  <div class="auth-wrap">
    <div class="auth-box fu">
      <h2>Crea Account</h2>
      <p class="auth-sub">Unisciti alla community di SkyFrost gratuitamente.</p>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px">
        <div style="background:rgba(26,143,255,.07);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-size:.7rem;color:var(--text-2);display:flex;align-items:center;gap:6px">🎮 Accesso completo</div>
        <div style="background:rgba(26,143,255,.07);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-size:.7rem;color:var(--text-2);display:flex;align-items:center;gap:6px">🛒 Gestione acquisti</div>
        <div style="background:rgba(26,143,255,.07);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-size:.7rem;color:var(--text-2);display:flex;align-items:center;gap:6px">🗳 Sistema voto</div>
        <div style="background:rgba(26,143,255,.07);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-size:.7rem;color:var(--text-2);display:flex;align-items:center;gap:6px">📊 Dashboard</div>
      </div>

      <div class="f-grp">
        <label class="f-lbl">Username</label>
        <input type="text" class="f-inp" placeholder="Scegli un nickname..." autocomplete="username">
      </div>
      <div class="f-grp">
        <label class="f-lbl">Email</label>
        <input type="email" class="f-inp" placeholder="tua@email.com" autocomplete="email">
      </div>
      <div class="f-grp">
        <label class="f-lbl">Password</label>
        <input type="password" class="f-inp" placeholder="Min. 8 caratteri" autocomplete="new-password">
      </div>
      <div class="f-grp">
        <label class="f-lbl">Conferma Password</label>
        <input type="password" class="f-inp" placeholder="Ripeti la password" autocomplete="new-password">
      </div>
      <button class="f-submit">Crea Account</button>
      <div style="text-align:center;margin-top:8px;font-size:.65rem;color:var(--text-3)">
        Registrandoti accetti i <a href="#" style="color:var(--cobalt)">Termini di Servizio</a> e la <a href="#" style="color:var(--cobalt)">Privacy Policy</a>.
      </div>
      <div class="auth-lnk">Hai già un account? <a href="login.html">Accedi</a></div>
    </div>
  </div>

</div>
<script src="assets/components.js"></script>
<script src="assets/main.js"></script>
</body>
</html>
